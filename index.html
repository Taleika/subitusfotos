<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Subí tus fotos | Berni</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family: "Raleway", sans-serif;
      background: linear-gradient(180deg,#f9f4f0,#f5ede7);
      color:#5d4b46;
      text-align:center;
      padding:20px;
    }

    h1{
      font-family:"Cormorant Garamond",serif;
      font-size:42px;
      margin:10px 0;
    }

    p{
      max-width:500px;
      margin:0 auto 20px;
      color:#7f6963;
    }

    .card{
      background:white;
      border-radius:25px;
      padding:30px 20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      max-width:500px;
      margin:20px auto;
    }

    .logo{
      width:220px;
      margin:0 auto 15px;
    }

    .btn{
      display:block;
      margin:10px auto;
      padding:15px;
      border-radius:999px;
      text-decoration:none;
      font-weight:600;
      width:90%;
      max-width:320px;
      transition:0.2s;
    }

    .btn-main{
      background:#b9898a;
      color:white;
    }

    .btn-alt{
      background:#f3e6e2;
      color:#5d4b46;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .divider{
      width:200px;
      margin:20px auto;
      opacity:0.7;
    }

    .steps{
      margin-top:20px;
    }

    .step{
      margin-bottom:15px;
      font-size:14px;
    }

    .small{
      font-size:13px;
      color:#999;
      margin-top:10px;
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- LOGO -->
    <img src="images/logo.png" class="logo" alt="Berni">

    <h1>Subí tus fotos</h1>

    <p>
      ¿Sacaste fotos o videos en la fiesta?  
      Subilos acá y ayudá a guardar este recuerdo 💖
    </p>

    <!-- BOTÓN PRINCIPAL -->
    <a class="btn btn-main" href="https://photos.app.goo.gl/eWLx4AznVbaFUSiR8" target="_blank">
      Subir fotos al álbum
    </a>

    <!-- BOTÓN WHATSAPP -->
    <a class="btn btn-alt" href="https://wa.me/5491167457458" target="_blank">
      Enviar por WhatsApp
    </a>

    <img src="images/divider1.svg" class="divider">

    <div class="steps">
      <div class="step">1. Entrá al álbum</div>
      <div class="step">2. Elegí tus fotos</div>
      <div class="step">3. Subilas y listo</div>
    </div>

    <p class="small">
      Si estás en iPhone, abrilo en Safari para mejor funcionamiento
    </p>

  </div>

</body>
</html>
